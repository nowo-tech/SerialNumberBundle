name: serial-number-bundle-demo-symfony-7
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: serial-number-symfony7-php
    working_dir: /app
    ports:
      - "${PORT:-8001}:80"
    volumes:
      - .:/app
      - ../..:/var/serial-number-bundle
      - composer-cache:/root/.composer/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=dev
    networks:
      - serial-number-demo-network

volumes:
  composer-cache:
    driver: local

networks:
  serial-number-demo-network:
    driver: bridge
