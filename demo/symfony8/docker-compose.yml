name: serial-number-bundle-demo-symfony-8
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: serial-number-symfony8-php
    working_dir: /app
    ports:
      - "${PORT:-8001}:80"
    volumes:
      - .:/app
      - ../..:/var/serial-number-bundle
      - ./docker/frankenphp/Caddyfile.dev:/etc/frankenphp/Caddyfile.dev
      - ./docker/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - composer-cache:/root/.composer/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - COMPOSER_MEMORY_LIMIT=-1
      # Fewer parallel HTTP/git operations when dist fails → less RAM (avoids OOM / exit 137 on WSL).
      - COMPOSER_MAX_PARALLEL_HTTP=4
      - APP_ENV=dev
      - APP_DEBUG=1
      - APP_SECRET=${APP_SECRET:-demo-secret}
    # Mitigate Docker/WSL DNS failures (composer curl error 6: Could not resolve host).
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
      - 1.0.0.1
    mem_limit: 2g
    networks:
      - serial-number-demo-network

volumes:
  composer-cache:
    driver: local

networks:
  serial-number-demo-network:
    driver: bridge
