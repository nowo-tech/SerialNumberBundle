name: serial-number-bundle
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: serial-number-bundle-php
    working_dir: /app
    volumes:
      - .:/app
      - composer-cache:/root/.composer/cache
      - coverage-data:/app/coverage
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
    command: ["tail", "-f", "/dev/null"]
    networks:
      - serial-number-bundle-network

volumes:
  composer-cache:
    driver: local
  coverage-data:
    driver: local

networks:
  serial-number-bundle-network:
    driver: bridge
