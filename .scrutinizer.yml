# REQ-CI-002 - see BUNDLES_FULL_SPECS_DETAILS.md
# PHP 8.2 on Scrutinizer: use a recent image (OpenSSL) - https://scrutinizer-ci.com/docs/guides/upgrading-trusty-image
# Demo apps are not installed in Scrutinizer; exclusions avoid analysing demo/* as library code.
checks:
  php:
    code_rating: true
    duplication: true

filter:
  excluded_paths:
    - "demo/*"
    - "tests/*"
    - "vendor/*"
    - "node_modules/*"

build:
  image: default-bionic
  environment:
    php:
      version: 8.2
      ini:
        memory_limit: -1
        "xdebug.mode": coverage

  cache:
    directories:
      - vendor/

  tests:
    before:
      - composer validate --strict
      - composer install --no-interaction --prefer-dist --optimize-autoloader
    override:
      - command: composer test-coverage
        environment:
          XDEBUG_MODE: coverage
        coverage:
          file: coverage.xml
          format: clover
